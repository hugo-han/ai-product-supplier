<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="100%" height="100%" fill="#F7F3E9"/>
  <text x="120" y="140" font-family="Arial" font-size="48" fill="#1E1E1E">风险评估与缓解（Risks & Mitigations）</text>
  <text x="120" y="260" font-family="Arial" font-size="28" fill="#333">• 降低门槛：可视化面板、预设模板、内嵌帮助与培训</text>
  <text x="120" y="320" font-family="Arial" font-size="28" fill="#333">• 反爬策略：优先走官方 API / 商务合作 / 第三方数据</text>
  <text x="120" y="380" font-family="Arial" font-size="28" fill="#333">• 账号风险：争取官方授权，最小权限与监控</text>
