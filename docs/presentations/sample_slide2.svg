<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <defs>
    <style>
      <![CDATA[
      .bg{fill:#F7F3E9}
      .title{font-family: 'Arial', sans-serif; font-size:48px; fill:#1E1E1E; font-weight:700}
      .sketch{stroke:#4A4A4A; stroke-width:5; fill:none; stroke-linecap:round; stroke-linejoin:round}
      .card{fill:#FFF; stroke:#E6E0D4; stroke-width:3}
      .warn{fill:#FFE6D1}
      ]]>
    </style>
  </defs>
  <rect class="bg" width="100%" height="100%"/>
  <text x="120" y="120" class="title">当前遇到的问题</text>
  
  <!-- three problem cards -->
  <g transform="translate(120,200)">
    <!-- card 1 -->
    <rect x="0" y="0" width="520" height="320" rx="12" class="card"/>
    <text x="28" y="48" font-family="Arial" font-size="20" fill="#333">1) 实现门槛高</text>
    <text x="28" y="90" font-family="Arial" font-size="16" fill="#555">场景偏向工具/平台，业务人员需一定技术能力</text>
    <!-- small sketch: person with toolbox -->
    <rect x="360" y="140" width="120" height="80" fill="#F6A6A6" stroke="#4A4A4A" stroke-width="4"/>
  
    <!-- card 2 -->
    <rect x="620" y="0" width="520" height="320" rx="12" class="card"/>
    <text x="648" y="48" font-family="Arial" font-size="20" fill="#333">2) 反爬厉害</text>
    <text x="648" y="90" font-family="Arial" font-size="16" fill="#555">检索场景类似爬虫，容易被封 IP 或查不到结果</text>
    <!-- small sketch: browser blocked by spiderweb -->
    <path d="M980 150 L1040 210" stroke="#4A4A4A" stroke-width="6" stroke-linecap="round"/>
    <circle cx="980" cy="200" r="36" stroke="#4A4A4A" stroke-width="5" fill="#FFF"/>

    <!-- card 3 -->
    <rect x="1240" y="0" width="520" height="320" rx="12" class="card"/>
    <text x="1270" y="48" font-family="Arial" font-size="20" fill="#333">3) 账号封禁风险</text>
    <text x="1270" y="90" font-family="Arial" font-size="16" fill="#555">获取价格/主图常需登录，账号池和定制化方案存在封号风险</text>
    <!-- small sketch: key and warning -->
    <rect x="1640" y="140" width="80" height="80" fill="#B7C68B" stroke="#4A4A4A" stroke-width="4"/>
  </g>

  <!-- footer note -->
  <rect x="120" y="940" width="1680" height="80" rx="8" ry="8" fill="#FFF3D9" stroke="#EBD8B7"/>
  <text x="160" y="998" font-family="Arial" font-size="20" fill="#2E2E2E">这些问题是目前我们落地与稳定性最大的障碍，建议优先级：API/商务合作 > 第三方数据 > 受控爬虫验证</text>

</svg>
