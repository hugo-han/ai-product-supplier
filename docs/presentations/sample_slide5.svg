<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080">
  <rect width="100%" height="100%" fill="#F7F3E9"/>
  <text x="120" y="140" font-family="Arial" font-size="48" fill="#1E1E1E">为什么用 Agent</text>
  <text x="120" y="260" font-family="Arial" font-size="28" fill="#333">• 可定制化、可在 Coze 上协同迭代</text>
  <text x="120" y="320" font-family="Arial" font-size="28" fill="#333">• 支持自动化查询与多轮交互，降低重复劳动</text>
  <text x="120" y="380" font-family="Arial" font-size="28" fill="#333">• 易集成到销售日常（聊天、导出、保存）</text>
</svg>
