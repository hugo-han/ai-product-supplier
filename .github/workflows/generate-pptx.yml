  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.10'

  - name: Install system dependencies
    run: |
      sudo apt-get update
      sudo apt-get install -y libcairo2 libpango1.0-0 libgdk-pixbuf2.0-0 libffi-dev build-essential

  - name: Install Python dependencies
    run: |
      python -m pip install --upgrade pip
      pip install python-pptx cairosvg cairocffi pillow

  - name: Generate PPTX
    run: |
      python scripts/generate_pptx.py --slides_dir docs/presentations --output docs/presentations/aibp-report.pptx

  - name: Commit and push generated PPTX
    run: |
      git config user.name "github-actions[bot]"
      git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      git add docs/presentations/aibp-report.pptx || true
      if git diff --staged --quiet; then
        echo "No changes to commit"
      else
        git commit -m "Generate PPTX: AIBP report (via GitHub Actions)"
        git push
      fi
